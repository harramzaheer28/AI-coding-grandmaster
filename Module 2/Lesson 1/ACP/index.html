<!DOCTYPE html>
<html>
<head>
    <title>Doraemon Character Card</title>

    <style>

        body {
            background-color: #e6f7ff;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .card {
            width: 350px;
            margin: 50px auto;
            background-color: white;
            border: 3px solid #00aaff;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 5px 5px 15px gray;
        }

        h1 {
            color: #0077cc;
        }

        img {
            width: 220px;
            border-radius: 10px;
        }

        .gadget {
            color: darkblue;
            font-weight: bold;
        }

        button {
            background-color: #00aaff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0077cc;
        }
    </style>
</head>

<body>

    <div class="card">

        <h1>Doraemon</h1>

        <img src="https://upload.wikimedia.org/wikipedia/en/b/bd/Doraemon_character.png" alt="Doraemon">

        <p style="color: purple; font-style: italic;">
            Doraemon is a robotic cat from the future who helps Nobita with amazing gadgets.
        </p>

        <p class="gadget">
            Favorite Gadget: Anywhere Door
        </p>

        <button>Meet Doraemon</button>

    </div>

</body>
</html>
