<!DOCTYPE html>
<html>
<head>
    <title>My Animal Fact File</title>
    <style>
        body{
            background-image: linear-gradient( rgb(116, 171, 255),rgb(231, 229, 229));
            background-repeat: no-repeat;
            min-height: 100vh;
        }
        .facts{
            background-color: rgb(255, 255, 255);
            width: 250px;
            height: 250px;
            padding: 25px;
            border: 8px  rgb(82, 111, 238) solid;
            margin: 25px;
        }
    </style>
</head>
<body>
    <center>
        <div class="facts">
        <h1 class="animal-name">Snow Leopard</h1>
        <p class="details">Type: Big Cat</p>
        <p class="details">Lives In: Mountains</p>
        <p class="details">Diet: Deer,Goat,Sheep</p>
        <p class="cool-fact"> Cool Fact: Can Leap up to 15 Meters in One JUMP!</p>
        </div>
    </center>
   
</body>
</html>
