<!DOCTYPE html>
<html>
    <head>
        <title>Forms of HTML</title>
 </head>
    <body>
        <form>
            <fieldset>
                <legend><b>PROFILE & GRADE</b></legend>
                <input type="text" id="fname" placeholder="Name"> <br>
                <input type="text" id="pass" placeholder=" Password"> <br>
                <input type="date" id="date" placeholder="Birthday"> <br>
                <label> Gender</label> <br>
                <input type="radio" name="gender" value="M"> M <br>
                <input type="radio" name="gender" value="F"> F <br>
                <label> Cities</label> <br>
                <input type="checkbox"> Islamabad <br>
                 <input type="checkbox"> Lahore <br>
                 <input type="checkbox"> Faislabad <br>
                 <select>
                    <option>Coding</option>
                    <option>Maths</option>
                    <option>Physics</option>
                </select> <br>
                <input type="Submit">
                

            </fieldset>
        </form>
    </body>
</html>
