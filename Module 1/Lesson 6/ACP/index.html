<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
</head>
<body>

<form>
<fieldset>
<legend>Student Registration Form</legend>

<label>Full Name:</label>
<input type="text" placeholder="Enter your name"><br>

<label>Father's Name:</label>
<input type="text" placeholder="Enter father's name"><br>
<label>Mother's Name:</label>
<input type="text" placeholder="Enter mother's name"><br><br>

<label>Email:</label>
<input type="email" placeholder="Enter email"><br><br>

<label>Phone Number:</label>
<input type="tel" placeholder="Enter phone number"><br><br>

<label>Date of Birth:</label>
<input type="date"><br><br>

<label>Gender:</label>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female<br><br>

<label>City:</label>
<select>
<option>Lahore</option>
<option>Karachi</option>
<option>Islamabad</option>
<option>Rawalpindi</option>
</select><br><br>

<label>Address:</label><br>
<textarea rows="4" cols="30"></textarea><br><br>

<label>Hobbies:</label><br>
<input type="checkbox"> Reading
<input type="checkbox"> Sports
<input type="checkbox"> Drawing
<input type="checkbox"> Gaming<br><br>

<label>Favorite Subject:</label>
<input type="text"><br><br>


<label>Username:</label>
<input type="text"><br><br>

<label>Password:</label>
<input type="password"><br><br>

<label>Confirm Password:</label>
<input type="password"><br><br>

<input type="checkbox"> I agree to the Terms and Conditions
<br><br>

<input type="submit" value="Register">
<input type="reset" value="Clear">

</fieldset>
</form>

</body>
</html
